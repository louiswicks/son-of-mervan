name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy-backend:
    name: Deploy Backend to Railway
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service son-of-mervan --environment production --detach

      - name: Smoke test — GET /health (with retries)
        run: |
          for i in $(seq 1 10); do
            echo "Attempt $i/10..."
            if curl -sf https://son-of-mervan-production.up.railway.app/health | grep -q '"status":"ok"'; then
              echo "Health check passed"
              exit 0
            fi
            sleep 15
          done
          echo "Health check failed after 150s" && exit 1
