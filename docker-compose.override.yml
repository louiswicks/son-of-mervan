# Development overrides — applied automatically when running `docker compose up` locally.
# Enables hot-reload for backend and frontend without rebuilding images.

services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    # Override CMD to use --reload flag for hot-reload
    command: sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      ENVIRONMENT: development
      LOG_LEVEL: DEBUG
    volumes:
      # Mount source code for hot-reload (excludes __pycache__ and .env)
      - .:/app
      - /app/__pycache__

  frontend:
    # In dev, run CRA dev server instead of Nginx
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8000
      # CRA dev server settings
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./web/src:/app/src
      - ./web/public:/app/public
